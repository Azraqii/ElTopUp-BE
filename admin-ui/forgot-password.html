<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lupa Password — El TopUp Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { width: 100%; max-width: 400px; padding: 24px; }
    .brand { text-align: center; font-size: 24px; font-weight: 700; color: #60a5fa; margin-bottom: 8px; }
    .subtitle { text-align: center; font-size: 14px; color: #94a3b8; margin-bottom: 32px; }
    .card { background: #1e293b; border-radius: 12px; padding: 32px; border: 1px solid #334155; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
    .form-group input { width: 100%; background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 12px; border-radius: 8px; font-size: 14px; }
    .form-group input:focus { outline: none; border-color: #60a5fa; }
    button[type="submit"] { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #2563eb; color: white; font-size: 15px; font-weight: 600; cursor: pointer; }
    button[type="submit"]:hover { background: #1d4ed8; }
    button[type="submit"]:disabled { opacity: 0.5; cursor: default; }
    .msg { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
    .msg-success { background: #166534; color: #4ade80; }
    .msg-error { background: #7f1d1d; color: #f87171; }
    .back-link { display: block; text-align: center; margin-top: 16px; color: #60a5fa; text-decoration: none; font-size: 13px; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">El TopUp Admin</div>
    <div class="subtitle">Reset Password</div>
    <div id="msg-area"></div>
    <div class="card">
      <form id="forgot-form">
        <div class="form-group">
          <label>Email Admin</label>
          <input type="email" id="email" placeholder="admin@eltopup.id" required>
        </div>
        <button type="submit" id="submit-btn">Kirim Link Reset</button>
      </form>
      <a href="/admin-ui/login.html" class="back-link">Kembali ke Login</a>
    </div>
  </div>
  <script>
    var API_BASE = window.location.origin;

    document.getElementById('forgot-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      var email = document.getElementById('email').value.trim();
      var btn = document.getElementById('submit-btn');

      if (!email) return;

      btn.disabled = true;
      btn.textContent = 'Mengirim...';

      try {
        var res = await fetch(API_BASE + '/api/admin/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email }),
        });
        var data = await res.json();
        document.getElementById('msg-area').innerHTML = '<div class="msg msg-success">' + (data.message || 'Link reset telah dikirim jika email terdaftar.') + '</div>';
      } catch (err) {
        document.getElementById('msg-area').innerHTML = '<div class="msg msg-error">Gagal menghubungi server.</div>';
      }

      btn.disabled = false;
      btn.textContent = 'Kirim Link Reset';
    });
  </script>
</body>
</html>
