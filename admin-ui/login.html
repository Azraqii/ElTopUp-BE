<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — El TopUp Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-container { width: 100%; max-width: 400px; padding: 24px; }
    .brand { text-align: center; font-size: 24px; font-weight: 700; color: #60a5fa; margin-bottom: 8px; }
    .subtitle { text-align: center; font-size: 14px; color: #94a3b8; margin-bottom: 32px; }
    .card { background: #1e293b; border-radius: 12px; padding: 32px; border: 1px solid #334155; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
    .form-group input { width: 100%; background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 12px; border-radius: 8px; font-size: 14px; }
    .form-group input:focus { outline: none; border-color: #60a5fa; }
    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 48px; }
    .toggle-pw { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 13px; }
    .toggle-pw:hover { color: #e2e8f0; }
    button[type="submit"] { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #2563eb; color: white; font-size: 15px; font-weight: 600; cursor: pointer; }
    button[type="submit"]:hover { background: #1d4ed8; }
    button[type="submit"]:disabled { opacity: 0.5; cursor: default; }
    .msg { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
    .msg-error { background: #7f1d1d; color: #f87171; }
    .forgot-link { display: block; text-align: center; margin-top: 16px; color: #60a5fa; text-decoration: none; font-size: 13px; }
    .forgot-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="brand">El TopUp Admin</div>
    <div class="subtitle">Login ke Dashboard Admin</div>
    <div id="msg-area"></div>
    <div class="card">
      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="admin@eltopup.id" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="Masukkan password" required>
            <button type="button" class="toggle-pw" onclick="togglePassword()">Show</button>
          </div>
        </div>
        <button type="submit" id="submit-btn">Login</button>
      </form>
      <a href="/admin-ui/forgot-password.html" class="forgot-link">Lupa password?</a>
    </div>
  </div>
  <script>
    var API_BASE = window.location.origin;

    if (localStorage.getItem('adminToken')) {
      window.location.href = '/admin-ui/dashboard.html';
    }

    function togglePassword() {
      var input = document.getElementById('password');
      var btn = document.querySelector('.toggle-pw');
      if (input.type === 'password') { input.type = 'text'; btn.textContent = 'Hide'; }
      else { input.type = 'password'; btn.textContent = 'Show'; }
    }

    function showError(text) {
      document.getElementById('msg-area').innerHTML = '<div class="msg msg-error">' + text + '</div>';
    }

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      var btn = document.getElementById('submit-btn');

      if (!email || !password) { showError('Email dan password wajib diisi.'); return; }

      btn.disabled = true;
      btn.textContent = 'Memproses...';
      document.getElementById('msg-area').innerHTML = '';

      try {
        var res = await fetch(API_BASE + '/api/admin/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password }),
        });
        var data = await res.json();

        if (res.ok && data.token) {
          localStorage.setItem('adminToken', data.token);
          window.location.href = '/admin-ui/dashboard.html';
        } else {
          showError(data.error || 'Login gagal.');
        }
      } catch (err) {
        showError('Gagal menghubungi server.');
      }

      btn.disabled = false;
      btn.textContent = 'Login';
    });
  </script>
</body>
</html>
